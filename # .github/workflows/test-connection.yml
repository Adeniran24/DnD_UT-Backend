# .github/workflows/test-connection.yml
name: Test Server Connection

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Test SSH connection
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts
        
        echo "🔍 Testing connection to ${{ secrets.SERVER_HOST }}..."
        
        ssh -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" "
          echo '✅ Connection successful!'
          echo ''
          echo '=== Server Information ==='
          echo 'Hostname: ' \$(hostname)
          echo 'Uptime: ' \$(uptime -p)
          echo 'OS: ' \$(lsb_release -d | cut -f2)
          echo ''
          echo '=== .NET Information ==='
          dotnet --version 2>/dev/null || echo '.NET not installed'
          echo ''
          echo '=== Application Status ==='
          sudo systemctl status dnd-gameapi --no-pager 2>/dev/null || echo 'Service not found'
          echo ''
          echo '=== Directory Check ==='
          ls -la /var/www/dndtool/DNDapi/GameApi/ 2>/dev/null || echo 'Directory not found'
          echo ''
          echo '=== Deploy Script ==='
          ls -la /usr/local/bin/deploy-dnd.sh 2>/dev/null || echo 'Deploy script not found'
        "
