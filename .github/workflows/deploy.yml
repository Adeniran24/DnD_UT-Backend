name: Deploy to Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Restore dependencies
      run: dotnet restore DNDapi/GameApi/DndApi.csproj
    
    - name: Build
      run: dotnet build DNDapi/GameApi/DndApi.csproj --configuration Release --no-restore
    
    - name: Publish
      run: dotnet publish DNDapi/GameApi/DndApi.csproj --configuration Release --no-build --output ./publish
    
    - name: Deploy to Server via SSH
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        port: ${{ secrets.SERVER_PORT }}
        source: "publish/*"
        target: "/var/www/dndtool/DNDapi/GameApi/publish/"
    
    - name: Restart Service on Server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        port: ${{ secrets.SERVER_PORT }}
        script: |
          cd /var/www/dndtool/DNDapi/GameApi
          sudo systemctl restart dnd-gameapi || echo "Service restart failed, trying to start..."
          sudo systemctl status dnd-gameapi --no-pager
